#This is the GitHub Actions pipeline — the heart of our CI/CD

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      # 4. Run pytest with coverage
      - name: Run tests
        run: |
          pytest tests/ \
            --junitxml=junit/test-results.xml \
            --cov=my_package \
            --cov-report=xml \
            --cov-report=html \
            --verbose

      # 5. Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: junit/

      # 6. Upload coverage report
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

      # 7. Build the package (wheel + sdist)
      - name: Build package
        run: python -m build

      # 8. Upload built package
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/